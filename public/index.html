    function printDailyReport() {
      if (dailyData.length === 0) { toast('請先產生報表再列印', 'error'); return; }
      window.print();
    }

    function exportDailyExcel() {
      if (dailyData.length === 0) { toast('請先產生報表，或此期間無資料', 'error'); return; }
      const s = document.getElementById('daily-start').value;
      const e = document.getElementById('daily-end').value;
      const BOM = '﻿';
      let csv = BOM + ['日期', '時間', '姓名', '公司', '組別', '事項類型', '地點', '處理內容', 'GPS緯度', 'GPS經度'].join(',') + '\n';
      dailyData.forEach(r => {
        csv += [
          r.report_date || '', r.report_time || '', csvEscape(r.display_name || ''),
          csvEscape(r.company_name || ''), csvEscape(r.group_name || ''), csvEscape(r.task_type || ''),
          csvEscape(r.location || ''), csvEscape(r.task_description || ''),
          r.gps_latitude || '', r.gps_longitude || '',
        ].join(',') + '\n';
      });
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `工作日報表_${s}_${e}.csv`;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    // ====== 人員管理 ======
    let allGroups = [];
    let allCompanies = [];
    let allUsersData = [];
    let userRoleFilter = 'all';
    let expandedUserId = null;

    async function loadGroupOptions() {
      try {
        const res = await fetch('/api/groups', { headers: authHeaders() });
        if (res.ok) allGroups = await res.json();
      } catch (e) {}
    }

    async function loadCompanyOptions() {
      try {
        const res = await fetch('/api/companies', { headers: authHeaders() });
        if (res.ok) allCompanies = await res.json();
      } catch (e) {}
    }

    function setUserRoleFilter(role) {
      userRoleFilter = role;
      document.querySelectorAll('#user-role-tabs .urt-btn').forEach(b => b.classList.toggle('active', b.dataset.role === role));
      renderUsers();
    }

    async function loadUsers() {
      await Promise.all([loadGroupOptions(), loadCompanyOptions()]);
      try {
        const res = await fetch('/api/users', { headers: authHeaders() });
        if (!res.ok) return;
        allUsersData = await res.json();
        renderUsers();
      } catch (e) {}
    }

    function groupOptionsFor(companyId) {
      const cid = companyId != null ? String(companyId) : '';
      return allGroups
        .filter(g => cid && String(g.company_id) === cid)
        .map(g => `<option value="${g.id}">${escHtml(g.name)}</option>`).join('');
    }

    function renderUsers() {
      const isAdmin = currentUser && currentUser.role === 'admin';
      const q = ((document.getElementById('user-search') || {}).value || '').trim().toLowerCase();
      const companyOpts = allCompanies.map(c => `<option value="${c.id}">${escHtml(c.name)}</option>`).join('');

      const filtered = allUsersData.filter(u => {
        const role = u.role === 'admin' ? 'admin' : (u.is_supervisor ? 'supervisor' : 'user');
        if (userRoleFilter !== 'all' && userRoleFilter !== role) return false;
        if (q && !(u.display_name || '').toLowerCase().includes(q) && !(u.user_id || '').toLowerCase().includes(q)) return false;
        return true;
      });

      const container = document.getElementById('user-cards');
      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">👥</div><p>沒有符合的人員</p></div>';
        return;
      }

      // 依公司分區
      const byCompany = {};
      filtered.forEach(u => { const key = u.company_name || '（未指定公司）'; (byCompany[key] = byCompany[key] || []).push(u); });

      // 每間公司內排序：管理員 → 主管 → 稽查員；同層級再依 組別 → 姓名
      const roleRank = u => u.role === 'admin' ? 0 : (u.is_supervisor ? 1 : 2);
      Object.values(byCompany).forEach(arr => arr.sort((a, b) => {
        const r = roleRank(a) - roleRank(b);
        if (r) return r;
        const ga = a.group_name || '￿', gb = b.group_name || '￿'; // 未分組排最後
        if (ga !== gb) return ga.localeCompare(gb, 'zh-Hant');
        return (a.display_name || '').localeCompare(b.display_name || '', 'zh-Hant');
      }));

      // 公司區塊排序：依公司名稱，「（未指定公司）」排最後
      const companyKeys = Object.keys(byCompany).sort((a, b) => {
        const au = a === '（未指定公司）', bu = b === '（未指定公司）';
        if (au !== bu) return au ? 1 : -1;
        return a.localeCompare(b, 'zh-Hant');
      });

      const cardHtml = u => {
        let roleBadge = '', avatarClass = 'user-bg';
        if (u.role === 'admin') { roleBadge = '<span class="role-badge role-admin">管理員</span>'; avatarClass = 'admin-bg'; }
        else if (u.is_supervisor) { roleBadge = '<span class="role-badge role-supervisor">主管</span>'; avatarClass = 'supervisor-bg'; }
        else { roleBadge = '<span class="role-badge role-user">稽查員</span>'; }

        const isAdminUser = u.user_id === 'admin';
        const canEdit = isAdmin && !isAdminUser;
        const currentRole = u.role === 'admin' ? 'admin' : (u.is_supervisor ? 'supervisor' : 'user');
        const uid = escAttr(u.user_id);
        const supIds = u.supervisor_company_ids || [];
        const expanded = expandedUserId === u.user_id;

        const metaParts = [escHtml(u.user_id)];
        if (u.group_name) metaParts.push('📁 ' + escHtml(u.group_name));
        if (currentRole === 'supervisor' && supIds.length) {
          const names = allCompanies.filter(c => supIds.includes(c.id)).map(c => c.name);
          if (names.length) metaParts.push('👁 管轄：' + escHtml(names.join('、')));
        }

        const editorHtml = (expanded && canEdit) ? `
          <div class="user-editor">
            <div class="user-card-controls">
              <label>所屬公司</label>
              <select id="company-sel-${uid}" onchange="onEditorCompanyChange('${uid}')">
                <option value="">未指定</option>
                ${companyOpts}
              </select>
              <label>群組</label>
              <select id="group-sel-${uid}">
                <option value="">未分組</option>
                ${groupOptionsFor(u.company_id)}
              </select>
              <label>權限</label>
              <select id="role-sel-${uid}" onchange="onEditorRoleChange('${uid}')">
                <option value="user" ${currentRole === 'user' ? 'selected' : ''}>稽查員</option>
                <option value="supervisor" ${currentRole === 'supervisor' ? 'selected' : ''}>主管</option>
              </select>
            </div>
            <div id="supcomp-wrap-${uid}" style="${currentRole === 'supervisor' ? '' : 'display:none'}">
              <div class="supcomp-box">
                <div class="supcomp-label">管轄公司（可複選）</div>
                <div class="supcomp-list" id="supcomp-list-${uid}">
                  ${allCompanies.length === 0 ? '<span style="color:#999;font-size:12px">尚無公司，請先到「公司管理」新增</span>' :
                    allCompanies.map(c => `<label class="supcomp-chk"><input type="checkbox" value="${c.id}" ${supIds.includes(c.id) ? 'checked' : ''}> ${escHtml(c.name)}</label>`).join('')}
                </div>
              </div>
            </div>
            <div class="user-card-actions">
              <button class="btn btn-primary" style="padding:8px 16px" onclick="saveUser('${uid}')">儲存</button>
              <button style="background:#f0f0f0;color:#555" onclick="toggleUserEditor('${uid}')">取消</button>
              <button style="background:#fff3e0;color:#e65100" onclick="resetPassword('${uid}', '${escAttr(u.display_name)}')">🔑 重設密碼</button>
              <button style="background:#fce4ec;color:#c62828" onclick="deleteUser('${uid}', '${escAttr(u.display_name)}')">🗑️ 刪除</button>
            </div>
          </div>` : '';

        return `
          <div class="user-card" id="ucard-${uid}">
            <div class="user-card-top">
              <div class="user-avatar ${avatarClass}">${(u.display_name || '?')[0]}</div>
              <div class="user-card-info">
                <div class="user-card-name">${escHtml(u.display_name)} ${roleBadge}</div>
                <div class="user-card-id">${metaParts.join('　')}</div>
              </div>
              ${canEdit ? `<button class="user-card-edit-btn" onclick="toggleUserEditor('${uid}')">${expanded ? '收合' : '編輯'}</button>` : ''}
            </div>
            ${editorHtml}
          </div>`;
      };

      container.innerHTML = companyKeys.map(company => `
        <div class="company-section">
          <div class="company-section-title">🏬 ${escHtml(company)}（${byCompany[company].length}）</div>
          <div class="user-cards">${byCompany[company].map(cardHtml).join('')}</div>
        </div>
      `).join('');

      // 設定展開中編輯器的下拉值
      if (expandedUserId) {
        const u = allUsersData.find(x => x.user_id === expandedUserId);
        if (u) {
          const csel = document.getElementById('company-sel-' + expandedUserId);
          if (csel) csel.value = u.company_id != null ? String(u.company_id) : '';
          const gsel = document.getElementById('group-sel-' + expandedUserId);
          if (gsel) gsel.value = u.group_id && u.group_id !== 'web' ? u.group_id : '';
        }
      }
    }

    function toggleUserEditor(userId) {
      expandedUserId = (expandedUserId === userId) ? null : userId;
      renderUsers();
    }

    // 所屬公司變更 → 群組選單只列該公司的群組
    function onEditorCompanyChange(userId) {
      const csel = document.getElementById('company-sel-' + userId);
      const gsel = document.getElementById('group-sel-' + userId);
      if (gsel) {
        gsel.innerHTML = '<option value="">未分組</option>' + groupOptionsFor(csel ? csel.value : '');
        gsel.value = '';
      }
    }

    // 權限變更 → 顯示/隱藏管轄公司
    function onEditorRoleChange(userId) {
      const roleSel = document.getElementById('role-sel-' + userId);
      const wrap = document.getElementById('supcomp-wrap-' + userId);
      if (wrap) wrap.style.display = (roleSel && roleSel.value === 'supervisor') ? '' : 'none';
    }

    async function saveUser(userId) {
      const companySel = document.getElementById('company-sel-' + userId);
      const groupSel = document.getElementById('group-sel-' + userId);
      const roleSel = document.getElementById('role-sel-' + userId);
      const companyId = companySel ? companySel.value : '';
      const groupId = groupSel ? groupSel.value : '';
      const isSupervisor = roleSel && roleSel.value === 'supervisor' ? 1 : 0;

      const supervisorCompanyIds = [];
      const wrap = document.getElementById('supcomp-list-' + userId);
      if (wrap) wrap.querySelectorAll('input[type=checkbox]:checked').forEach(cb => supervisorCompanyIds.push(Number(cb.value)));

      try {
        const res = await fetch('/api/users/' + encodeURIComponent(userId) + '/group', {
          method: 'PUT', headers: jsonHeaders(),
          body: JSON.stringify({ groupId: groupId || null, companyId: companyId || null, isSupervisor, supervisorCompanyIds }),
        });
        if (!res.ok) { const d = await res.json(); toast(d.error || '設定失敗', 'error'); return; }
        toast('已更新', 'success');
        expandedUserId = null;
        loadUsers();
      } catch (e) { toast('網路錯誤', 'error'); }
    }

    async function deleteUser(userId, displayName) {
      const ok = await confirmDialog(`確定要刪除「${displayName}」嗎？\n\n此操作會同時刪除該人員的所有回報紀錄，無法復原！`, { title: '刪除人員', okText: '刪除', danger: true });
      if (!ok) return;
      try {
        const res = await fetch('/api/users/' + encodeURIComponent(userId), { method: 'DELETE', headers: authHeaders() });
        const data = await res.json();
        if (!res.ok) { toast(data.error || '刪除失敗', 'error'); return; }
        toast('已刪除', 'success');
        loadUsers();
        loadSummary();
      } catch (e) { toast('網路錯誤', 'error'); }
    }

    async function resetPassword(userId, displayName) {
      const newPw = await promptDialog({ title: '重設密碼', message: `為「${displayName}」設定新密碼（至少 4 個字元）`, type: 'password', placeholder: '輸入新密碼' });
      if (newPw === null) return;
      if (newPw.length < 4) { toast('密碼至少 4 個字元', 'error'); return; }
      try {
        const res = await fetch('/api/users/' + encodeURIComponent(userId) + '/reset-password', {
          method: 'POST', headers: jsonHeaders(),
          body: JSON.stringify({ newPassword: newPw }),
        });
        const data = await res.json();
        if (!res.ok) { toast(data.error || '重設失敗', 'error'); return; }
        toast(`已重設「${displayName}」的密碼`, 'success');
      } catch (e) { toast('網路錯誤', 'error'); }
    }

    // ====== 編輯回報 ======
    function openEditModal(data) {
      document.getElementById('edit-id').value = data.id;
      const sel = document.getElementById('edit-type');
      // 若是舊資料的非標準類型，臨時補一個選項，避免顯示錯誤或被誤改
      if (data.task_type && !REPORT_TYPES.some(t => t.name === data.task_type)) {
        sel.insertAdjacentHTML('beforeend', `<option value="${escHtml(data.task_type)}">${escHtml(data.task_type)}</option>`);
      }
      sel.value = data.task_type;
      document.getElementById('edit-location').value = data.location;
      document.getElementById('edit-task').value = data.task_description;
      toggleEditFields();
      document.getElementById('edit-modal').classList.add('show');
    }

    // 「離開」類型不需要地點/處理內容
    function toggleEditFields() {
      const isLeave = document.getElementById('edit-type').value === '離開';
      document.getElementById('edit-detail-fields').style.display = isLeave ? 'none' : '';
    }

    function closeEditModal() {
      document.getElementById('edit-modal').classList.remove('show');
      // 還原編輯彈窗選項，移除臨時補上的舊類型
      initTypeEmojiMap();
    }

    async function saveEdit() {
      const id = document.getElementById('edit-id').value;
      const taskType = document.getElementById('edit-type').value;
      const location = document.getElementById('edit-location').value.trim();
      const task = document.getElementById('edit-task').value.trim();
      // 「離開」不需要地點/處理內容，其餘類型必填
      if (taskType !== '離開' && (!location || !task)) { toast('地點和處理內容不能為空', 'error'); return; }

      const btn = document.getElementById('edit-save-btn');
      btn.disabled = true; btn.textContent = '儲存中...';
      try {
        const res = await fetch('/api/reports/' + id, { method: 'PUT', headers: jsonHeaders(), body: JSON.stringify({ taskType, location, task }) });
        const data = await res.json();
        if (!res.ok) { toast(data.error || '修改失敗', 'error'); btn.disabled = false; btn.textContent = '儲存'; return; }
        closeEditModal();
        toast('已儲存', 'success');
        loadReports();
      } catch (e) { toast('網路錯誤', 'error'); }
      btn.disabled = false; btn.textContent = '儲存';
    }

    async function deleteReport(id) {
      const ok = await confirmDialog('確定要刪除這筆回報紀錄嗎？此操作無法復原！', { title: '刪除回報', okText: '刪除', danger: true });
      if (!ok) return;
      try {
        const res = await fetch('/api/reports/' + id, { method: 'DELETE', headers: authHeaders() });
        if (!res.ok) { const d = await res.json(); toast(d.error || '刪除失敗', 'error'); return; }
        toast('已刪除', 'success');
        loadReports();
        loadSummary();
      } catch (e) { toast('網路錯誤', 'error'); }
    }

    document.getElementById('edit-modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('edit-modal')) closeEditModal();
    });

    // ====== 公司管理 ======
    function toggleAddCompanyForm() {
      document.getElementById('add-company-form').classList.toggle('show');
      document.getElementById('new-company-name').value = '';
    }

    async function loadCompanies() {
      try {
        const res = await fetch('/api/companies', { headers: authHeaders() });
        if (!res.ok) return;
        const companies = await res.json();
        const list = document.getElementById('company-list');
        if (companies.length === 0) {
          list.innerHTML = '<div class="empty-state"><div class="icon">🏬</div><p>尚無公司，點擊上方按鈕新增</p></div>';
          return;
        }
        list.innerHTML = companies.map(c => `
          <div class="group-card">
            <div class="group-info">
              <div class="group-name">${escHtml(c.name)}</div>
              <div class="group-meta">👥 ${c.member_count || 0} 位人員</div>
            </div>
            <div class="group-actions">
              <button class="btn-edit" onclick="editCompanyName(${c.id}, '${escAttr(c.name)}')">編輯</button>
              <button class="btn-del-report" onclick="deleteCompany(${c.id}, '${escAttr(c.name)}')">刪除</button>
            </div>
          </div>
        `).join('');
      } catch (e) {}
    }

    async function addCompany() {
      const name = document.getElementById('new-company-name').value.trim();
      if (!name) { toast('請輸入公司名稱', 'error'); return; }
      try {
        const res = await fetch('/api/companies', { method: 'POST', headers: jsonHeaders(), body: JSON.stringify({ name }) });
        const data = await res.json();
        if (!res.ok) { toast(data.error || '新增失敗', 'error'); return; }
        toast('已新增公司', 'success');
        toggleAddCompanyForm();
        loadCompanies();
      } catch (e) { toast('網路錯誤', 'error'); }
    }

    async function editCompanyName(id, currentName) {
      const newName = await promptDialog({ title: '修改公司名稱', defaultValue: currentName, placeholder: '公司名稱' });
      if (newName === null || newName.trim() === '' || newName.trim() === currentName) return;
      try {
        const res = await fetch('/api/companies/' + id, { method: 'PUT', headers: jsonHeaders(), body: JSON.stringify({ name: newName.trim() }) });
        const d = await res.json();
        if (!res.ok) { toast(d.error || '修改失敗', 'error'); return; }
        toast('已更新', 'success');
        loadCompanies();
      } catch (e) { toast('網路錯誤', 'error'); }
    }

    async function deleteCompany(id, name) {
      const ok = await confirmDialog(`確定要刪除公司「${name}」嗎？\n（須先將該公司人員改至其他公司）`, { title: '刪除公司', okText: '刪除', danger: true });
      if (!ok) return;
      try {
        const res = await fetch('/api/companies/' + id, { method: 'DELETE', headers: authHeaders() });
        const data = await res.json();
        if (!res.ok) { toast(data.error || '刪除失敗', 'error'); return; }
        toast('已刪除', 'success');
        loadCompanies();
      } catch (e) { toast('網路錯誤', 'error'); }
    }

    // ====== 分組管理 ======
    let groupCompanyMap = {}; // groupId -> company_id

    async function toggleAddGroupForm() {
      const form = document.getElementById('add-group-form');
      form.classList.toggle('show');
      document.getElementById('new-group-name').value = '';
      if (form.classList.contains('show')) {
        await loadCompanyOptions();
        const sel = document.getElementById('new-group-company');
        sel.innerHTML = allCompanies.length === 0
          ? '<option value="">請先到公司管理新增公司</option>'
          : allCompanies.map(c => `<option value="${c.id}">${escHtml(c.name)}</option>`).join('');
      }
    }

    async function loadGroups() {
      try {
        await loadCompanyOptions();
        const res = await fetch('/api/groups', { headers: authHeaders() });
        if (!res.ok) return;
        const groups = await res.json();
        const list = document.getElementById('group-list');

        groupCompanyMap = {};
        groups.forEach(g => { groupCompanyMap[g.id] = g.company_id; });

        if (groups.length === 0) {
          list.innerHTML = '<div class="empty-state"><div class="icon">🏢</div><p>尚無群組，點擊上方按鈕新增</p></div>';
          return;
        }

        // 依公司分區
        const byCompany = {};
        groups.forEach(g => {
          const key = g.company_name || '（未指定公司）';
          (byCompany[key] = byCompany[key] || []).push(g);
        });

        const groupCardHtml = g => `
          <div>
            <div class="group-card" onclick="toggleGroupMembers(${g.id})" style="cursor:pointer">
              <div class="group-info">
                <div class="group-name">${escHtml(g.name)}</div>
                <div class="group-meta">👥 ${g.member_count || 0} 位成員${g.supervisor_name ? '　👤 主管：' + escHtml(g.supervisor_name) : ''}</div>
              </div>
              <div class="group-actions" onclick="event.stopPropagation()">
                <button class="btn-edit" onclick="editGroup(${g.id}, '${escAttr(g.name)}', ${g.company_id != null ? g.company_id : 'null'})">編輯</button>
                <button class="btn-del-report" onclick="deleteGroup(${g.id}, '${escAttr(g.name)}')">刪除</button>
              </div>
            </div>
            <div class="group-members" id="group-members-${g.id}" style="display:none"></div>
          </div>`;

        list.innerHTML = Object.entries(byCompany).map(([company, gs]) => `
          <div class="company-section">
            <div class="company-section-title">🏬 ${escHtml(company)}</div>
            ${gs.map(groupCardHtml).join('')}
          </div>
        `).join('');

        // 如果之前有展開的群組，重新展開
        if (expandedGroup) {
          const el = document.getElementById('group-members-' + expandedGroup);
          if (el) { el.style.display = 'block'; loadGroupMembers(expandedGroup); }
        }
      } catch (e) {}
    }

    async function toggleGroupMembers(groupId) {
      const el = document.getElementById('group-members-' + groupId);
      if (!el) return;
      if (el.style.display === 'block') {
        el.style.display = 'none';
        expandedGroup = null;
        return;
      }
      // 關閉其他
      document.querySelectorAll('.group-members').forEach(m => m.style.display = 'none');
      el.style.display = 'block';
      expandedGroup = groupId;
      loadGroupMembers(groupId);
    }

    async function loadGroupMembers(groupId) {
      const el = document.getElementById('group-members-' + groupId);
      el.innerHTML = '載入中...';
      try {
        const cid = groupCompanyMap[groupId];
        const unassignedUrl = '/api/users/unassigned' + (cid ? '?companyId=' + cid : '');
        const [membersRes, unassignedRes] = await Promise.all([
          fetch('/api/groups/' + groupId + '/members', { headers: authHeaders() }),
          fetch(unassignedUrl, { headers: authHeaders() }),
        ]);
        const members = await membersRes.json();
        const unassigned = await unassignedRes.json();

        let html = '';
        if (members.length === 0) {
          html = '<div style="color:#999;font-size:13px;padding:4px 0">此群組尚無成員</div>';
        } else {
          html = members.map(m => `
            <div class="member-row">
              <span class="member-name">
                <strong>${escHtml(m.display_name)}</strong>
                <span style="color:#999;font-size:12px;margin-left:4px">(${escHtml(m.user_id)})</span>
                ${m.is_supervisor ? '<span class="role-badge role-supervisor" style="margin-left:6px">主管</span>' : ''}
              </span>
              <div class="member-actions">
                <button style="background:${m.is_supervisor ? '#fce4ec' : '#e3f2fd'};color:${m.is_supervisor ? '#c62828' : '#1565c0'}"
                  onclick="setSuper('${escAttr(m.user_id)}', ${groupId}, ${m.is_supervisor ? 0 : 1})">
                  ${m.is_supervisor ? '取消本公司主管' : '設為本公司主管'}
                </button>
                <button style="background:#fce4ec;color:#c62828" onclick="removeMember('${escAttr(m.user_id)}', ${groupId})">移除</button>
              </div>
            </div>
          `).join('');
        }

        // 指派新成員
        if (unassigned.length > 0) {
          html += `
            <div class="assign-bar">
              <select id="assign-select-${groupId}">
                <option value="">選擇成員加入...</option>
                ${unassigned.map(u => `<option value="${escHtml(u.user_id)}">${escHtml(u.display_name)} (${escHtml(u.user_id)})</option>`).join('')}
              </select>
              <button class="btn btn-primary" style="padding:8px 14px;font-size:13px" onclick="assignMember(${groupId})">加入</button>
            </div>`;
        } else {
          html += '<div style="color:#999;font-size:12px;margin-top:8px;padding-top:8px;border-top:1px dashed #ddd">所有使用者都已分組</div>';
        }

        el.innerHTML = html;
      } catch (e) { el.innerHTML = '<div style="color:#e53935">載入失敗</div>'; }
    }

    async function addGroup() {
      const name = document.getElementById('new-group-name').value.trim();
      const companyId = document.getElementById('new-group-company').value;
      if (!name) { toast('請輸入群組名稱', 'error'); return; }
      if (!companyId) { toast('請選擇所屬公司', 'error'); return; }
      try {
        const res = await fetch('/api/groups', { method: 'POST', headers: jsonHeaders(), body: JSON.stringify({ name, companyId: Number(companyId) }) });
        const data = await res.json();
        if (!res.ok) { toast(data.error || '新增失敗', 'error'); return; }
        toast('已新增群組', 'success');
        toggleAddGroupForm();
        loadGroups();
      } catch (e) { toast('網路錯誤', 'error'); }
    }

    // 編輯群組：可改名稱 + 指定所屬公司（指定後成員公司一併對齊）
    async function editGroup(id, currentName, currentCompanyId) {
      await loadCompanyOptions();
      if (allCompanies.length === 0) { toast('尚無公司，請先到「公司管理」新增', 'error'); return; }
      const curCid = currentCompanyId != null ? String(currentCompanyId) : '';
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay show';
      overlay.innerHTML = `
        <div class="modal-box" style="max-width:420px">
          <div class="modal-title">編輯群組</div>
          <div class="modal-field">
            <label>群組名稱</label>
            <input type="text" class="eg-name" value="${escAttr(currentName)}" />
          </div>
          <div class="modal-field">
            <label>所屬公司</label>
            <select class="eg-company">
              ${allCompanies.map(c => `<option value="${c.id}" ${String(c.id) === curCid ? 'selected' : ''}>${escHtml(c.name)}</option>`).join('')}
            </select>
          </div>
          <div class="modal-actions">
            <button class="btn btn-secondary eg-cancel">取消</button>
            <button class="btn btn-primary eg-save">儲存</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      const close = () => overlay.remove();
      overlay.querySelector('.eg-cancel').onclick = close;
      overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
      overlay.querySelector('.eg-save').onclick = async () => {
        const name = overlay.querySelector('.eg-name').value.trim();
        const companyId = overlay.querySelector('.eg-company').value;
        if (!name) { toast('請輸入群組名稱', 'error'); return; }
        if (!companyId) { toast('請選擇所屬公司', 'error'); return; }
        try {
          const res = await fetch('/api/groups/' + id, { method: 'PUT', headers: jsonHeaders(), body: JSON.stringify({ name, companyId: Number(companyId) }) });
          const d = await res.json();
          if (!res.ok) { toast(d.error || '修改失敗', 'error'); return; }
          toast('已更新', 'success');
          close();
          loadGroups();
        } catch (e) { toast('網路錯誤', 'error'); }
      };
    }

    async function deleteGroup(id, name) {
      const ok = await confirmDialog(`確定要刪除群組「${name}」嗎？\n（須先移除所有成員）`, { title: '刪除群組', okText: '刪除', danger: true });
      if (!ok) return;
      try {
        const res = await fetch('/api/groups/' + id, { method: 'DELETE', headers: authHeaders() });
        const data = await res.json();
        if (!res.ok) { toast(data.error || '刪除失敗', 'error'); return; }
        toast('已刪除', 'success');
        if (expandedGroup === id) expandedGroup = null;
        loadGroups();
      } catch (e) { toast('網路錯誤', 'error'); }
    }

    async function assignMember(groupId) {
      const sel = document.getElementById('assign-select-' + groupId);
      const userId = sel.value;
      if (!userId) { toast('請選擇成員', 'error'); return; }
      try {
        const res = await fetch('/api/users/' + encodeURIComponent(userId) + '/group', {
          method: 'PUT', headers: jsonHeaders(),
          body: JSON.stringify({ groupId: groupId, isSupervisor: false }),
        });
        const data = await res.json();
        if (!res.ok) { toast(data.error || '指派失敗', 'error'); return; }
        toast('已加入群組', 'success');
        loadGroupMembers(groupId);
        loadGroups();
      } catch (e) { toast('網路錯誤', 'error'); }
    }

    // 在該群組所屬公司，設定/取消此人為主管（公司感知，可累加多間公司）
    async function setSuper(userId, groupId, enabled) {
      const companyId = groupCompanyMap[groupId];
      if (!companyId) { toast('此群組尚未指定公司', 'error'); return; }
      try {
        const res = await fetch('/api/users/' + encodeURIComponent(userId) + '/supervisor-company', {
          method: 'PUT', headers: jsonHeaders(),
          body: JSON.stringify({ companyId: Number(companyId), enabled: !!enabled }),
        });
        if (!res.ok) { const d = await res.json(); toast(d.error || '設定失敗', 'error'); return; }
        toast(enabled ? '已設為本公司主管' : '已取消本公司主管', 'success');
        loadGroupMembers(groupId);
        loadGroups();
      } catch (e) { toast('網路錯誤', 'error'); }
    }

    async function removeMember(userId, groupId) {
      const ok = await confirmDialog('確定要將此成員移出群組？', { title: '移除成員', okText: '移除', danger: true });
      if (!ok) return;
      try {
        const res = await fetch('/api/users/' + encodeURIComponent(userId) + '/group', {
          method: 'PUT', headers: jsonHeaders(),
          body: JSON.stringify({ groupId: null, isSupervisor: false }),
        });
        if (!res.ok) { const d = await res.json(); toast(d.error || '移除失敗', 'error'); return; }
        toast('已移除', 'success');
        loadGroupMembers(groupId);
        loadGroups();
      } catch (e) { toast('網路錯誤', 'error'); }
    }

    // ====== 回報狀態面板 ======
    async function loadStatusBoard() {
      const list = document.getElementById('status-list');
      list.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>載入中...</p></div>';

      try {
        const res = await fetch('/api/status-board', { headers: authHeaders() });
        if (!res.ok) {
          const d = await res.json();
          list.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>${d.error || '載入失敗'}</p></div>`;
          return;
        }
        const data = await res.json();
        document.getElementById('status-date').textContent = `📅 ${data.today}`;

        const reported = data.users.filter(u => u.reported_today);
        const notReported = data.users.filter(u => !u.reported_today);
        const totalCount = data.users.reduce((s, u) => s + u.today_count, 0);

        document.getElementById('status-summary').innerHTML = `
          <div class="status-summary-card"><div class="ss-value" style="color:#06c755">${reported.length}</div><div class="ss-label">已回報</div></div>
          <div class="status-summary-card"><div class="ss-value" style="color:#e53935">${notReported.length}</div><div class="ss-label">未回報</div></div>
          <div class="status-summary-card"><div class="ss-value" style="color:#4a90d9">${totalCount}</div><div class="ss-label">總筆數</div></div>
          <div class="status-summary-card"><div class="ss-value" style="color:#ff9800">${data.users.length > 0 ? Math.round(reported.length / data.users.length * 100) : 0}%</div><div class="ss-label">回報率</div></div>
        `;

        // 排序：未回報的排前面
        const sorted = [...notReported, ...reported];

        list.innerHTML = sorted.map(u => {
          const isReported = u.reported_today;
          const lr = u.last_report;
          let detailHtml = '';
          if (lr) {
            detailHtml = `最後回報：${lr.date} ${lr.time}　📋 ${escHtml(lr.type || '')}　📍 ${escHtml(lr.location || '')}`;
          } else {
            detailHtml = '從未回報';
          }

          return `
            <div class="status-card ${isReported ? 'reported' : 'not-reported'}">
              <div class="status-avatar ${isReported ? 'reported' : 'not-reported'}">${(u.display_name || '?')[0]}</div>
              <div class="status-info">
                <div class="status-name">${escHtml(u.display_name)}
                  ${u.is_supervisor ? '<span class="role-badge role-supervisor" style="font-size:10px;padding:1px 6px;margin-left:4px">主管</span>' : ''}
                </div>
                <div class="status-detail">${detailHtml}</div>
              </div>
              <div class="status-count ${isReported ? 'reported' : 'not-reported'}">${u.today_count}</div>
            </div>`;
        }).join('');
      } catch (e) {
        list.innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>載入失敗</p></div>';
      }
    }

    // ====== 後台登入 ======
    async function adminLogin() {
      const username = document.getElementById('admin-username').value.trim();
      const password = document.getElementById('admin-password').value;
      const errEl = document.getElementById('admin-login-error');
      errEl.classList.remove('show');

      if (!username || !password) {
        errEl.textContent = '請輸入帳號和密碼';
        errEl.classList.add('show');
        return;
      }

      const btn = document.getElementById('admin-login-btn');
      btn.disabled = true;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error;
          errEl.classList.add('show');
          btn.disabled = false;
          return;
        }
        authToken = data.token;
        localStorage.setItem('authToken', authToken);
        // 透過 /api/me 取得完整身分（含 isSupervisor），避免主管登入後被誤判踢回前台
        await checkAuth();
      } catch (e) {
        errEl.textContent = '網路錯誤，請重試';
        errEl.classList.add('show');
      }
      btn.disabled = false;
    }

    document.getElementById('admin-password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') adminLogin();
    });

    // ====== 初始化 ======
    checkAuth();
  </script>
</body>
</html>
